# Configuracion generica para una sola base de datos

[alembic]

# Ruta a los scripts de migracion
# Define la carpeta donde se guardaran los archivos de migracion
# %(here)s es una variable que significa "en esta misma carpeta donde esta el archivo .ini"

script_location = %(here)s/alembic

# Plantilla usada para generar nombres de archivos de migracion
# Por defecto usa: %%(rev)s_%%(slug)s
#
# Descomentar la siguiente linea si quieres que el nombre del archivo
# incluya la fecha y hora como prefijo
#
# Consultar la documentacion para ver todos los tokens disponibles:
# https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
#
# Ejemplo de plantilla con fecha y hora en el nombre del archivo:
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
#
# Alternativamente, se pueden organizar las migraciones en subdirectorios
# por fecha (requiere activar recursive_version_locations = true)
# file_template = %%(year)d/%%(month).2d/%%(day).2d_%%(hour).2d%%(minute).2d_%%(second).2d_%%(rev)s_%%(slug)s

# Ruta que se agregara al inicio de sys.path
# Por defecto usa el directorio de trabajo actual
# Permite que Alembic importe los modelos de FastAPI y detecte cambios
prepend_sys_path = .


# Zona horaria a usar al renderizar la fecha dentro del archivo de migracion
# asi como en el nombre del archivo
# Si se especifica, requiere la libreria tzdata, que puede instalarse agregando
# `alembic[tz]` a los requisitos de pip
# El valor de cadena se pasa a ZoneInfo()
# Dejar en blanco para usar la hora local
# timezone =

# Longitud maxima de caracteres a aplicar al campo "slug"
# truncate_slug_length = 40

# Establecer en 'true' para ejecutar el entorno durante
# el comando 'revision', independientemente de la generacion automatica
# revision_environment = false

# Establecer en 'true' para permitir que archivos .pyc y .pyo sin
# un archivo fuente .py sean detectados como revisiones en el directorio
# versions/
# sourceless = false

# Especificacion de la ubicacion de versiones; por defecto apunta a
# <script_location>/versions. Al usar multiples directorios de versiones,
# las revisiones iniciales deben especificarse con --version-path.
# El separador de rutas aqui debe ser el mismo que se especifique en "path_separator" mas abajo
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# path_separator indica que caracter se usa para separar listas de rutas de archivos,
# incluyendo version_locations y prepend_sys_path dentro de archivos configparser como alembic.ini
# El valor por defecto en nuevos archivos alembic.ini es "os", que usa os.pathsep
# para proporcionar separacion de rutas dependiente del sistema operativo
#
# Ten en cuenta que para soportar archivos alembic.ini heredados, este valor por defecto NO
# se aplica si path_separator no está presente en alembic.ini. Si esta
# opcion se omite por completo, la logica de respaldo es la siguiente:
#
# 1. El analisis de la opcion version_locations recurre a la clave heredada
#    "version_path_separator", que si esta ausente recurre al comportamiento
#    heredado de separar por espacios y/o comas
# 2. El analisis de la opcion prepend_sys_path recurre al comportamiento
#    heredado de separar por espacios, comas o dos puntos
#
# Valores validos para path_separator son:
#
# path_separator = :
# path_separator = ;
# path_separator = space
# path_separator = newline
#
# Usar os.pathsep. Configuracion por defecto para proyectos nuevos
path_separator = os

# Establecer en 'true' para buscar archivos fuente de forma recursiva
# en cada directorio de "version_locations"
# Nuevo en Alembic version 1.10
# recursive_version_locations = false

# Codificacion de salida usada cuando se escriben los archivos de revision
# desde script.py.mako
# output_encoding = utf-8

# URL de la base de datos. Solo es usada por el script env.py mantenido por el usuario
# Otras formas de configurar las URLs de la base de datos pueden personalizarse dentro del archivo
# env.py
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# post_write_hooks define scripts o funciones Python que se ejecutan
# sobre los scripts de revision recien generados. Consultar la documentacion para mas
# detalles y ejemplos

# Formatear usando "black" - usar el ejecutor console_scripts, contra el punto de entrada "black"
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Analizar e intentar corregir usando "ruff" - usar el ejecutor de modulo, contra el modulo "ruff"
# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Alternativamente, usar el ejecutor exec para ejecutar un binario encontrado en tu PATH
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Configuracion de logging. Tambien es usada unicamente por el script env.py mantenido por el usuario
# Esto evita que tu terminal se llene de mensajes innecesarios de la base de datos, 
# mostrando solo lo importante
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
